<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#26160f" />
    <meta name="description" content="Tavola Nostra — seasonal Italian dining in the Tuscan tradition." />
    <title>Tavola Nostra — Cucina Toscana</title>
    <script type="module" crossorigin src="./assets/index-C7800bQQ.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DU4PZiDQ.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (localStorage.getItem("tavola-case-language") === "ru") {
        localStorage.setItem("tavola-case-language", "en");
      }

      const removeRussianOption = () => {
        document.querySelectorAll(".case-language__button").forEach((button) => {
          if (button.textContent.trim() === "Русский") button.remove();
        });
      };

      new MutationObserver(removeRussianOption).observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });

      document.addEventListener("click", (event) => {
        const drawer = document.querySelector(".scene-drawer--open");
        if (!drawer) return;

        const clickedOutside = !event.target.closest(".scene-drawer");
        if (clickedOutside) {
          drawer.querySelector(".scene-drawer__close")?.click();
        }
      }, true);
    </script>
  </body>
</html>
